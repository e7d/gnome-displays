name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Lint
        run: |
          docker run --rm -v "$PWD:/mnt" -w /mnt \
            koalaman/shellcheck@sha256:61862eba1fcf09a484ebcc6feea46f1782532571a34ed51fedf90dd25f925a8d \
            gnome-displays.sh install.sh

      - name: Stamp version
        run: |
          v="${GITHUB_REF_NAME#v}"
          sed -i "s/^VERSION=\"dev\"\$/VERSION=\"$v\"/" gnome-displays.sh
          grep -q "^VERSION=\"$v\"\$" gnome-displays.sh || {
            echo "Version stamping failed; VERSION=\"dev\" anchor not found." >&2
            exit 1
          }

      - name: Checksums
        run: sha256sum gnome-displays.sh install.sh > SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            gnome-displays.sh install.sh SHA256SUMS \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
